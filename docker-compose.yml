services:

  backend:
    build:
      context: ./backend
      target: dev
    restart: unless-stopped
    ports:
      - "8100:8100"
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data/projects:/app/data/projects
    environment:
      PROJECTS_DATA_DIR: /app/data/projects
      HOST_PROJECTS_DIR: ${HOST_PROJECTS_DIR:-}
    env_file:
      - ./backend/.env
    depends_on:
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - webdev

  frontend:
    build:
      context: ./frontend
      target: dev
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      BACKEND_URL: http://backend:8100
    depends_on:
      - backend
    networks:
      - webdev

  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - webdev

  qdrant:
    image: qdrant/qdrant:latest
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - webdev


volumes:
  mongo_data:
  qdrant_data:


networks:
  webdev:
    driver: bridge
